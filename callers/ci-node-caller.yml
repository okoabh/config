name: CI (Node)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: okoabh/config/.github/setup@main
        with:
          runtime: pnpm

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm tsc --noEmit

      - name: Format check
        run: pnpm format:check

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: okoabh/config/.github/setup@main
        with:
          runtime: pnpm

      - name: Run tests
        run: pnpm test
